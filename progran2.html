<!DOCTYPE html>
<html lang="en">
<head>
   
    <title>Document</title>
</head>
  <body>
  <h2>guess game</h2>
  <input type="number" id="num" placeholder="Enter your number">
  <button onclick="playGame()">Submit Guess</button>
  <p id="feedback"></p>
  <p id="attempts"></p>
  <script>
    let targetNumber = Math.floor(Math.random() * 50) + 1;
    let count= 0;

    function playGame(){
        let number=document.getElementById("num").value;
        count++;
        document.getElementById("attempts").innerText = `Attempts: ${count}`;

        if (number == targetNumber) {
            document.getElementById("feedback").innerText = "Congratulations! You've guessed the number!";
        } else if (number < targetNumber) {
            document.getElementById("feedback").innerText = "Too low! Try again.";
        } else {
            document.getElementById("feedback").innerText = "Too high! Try again.";
        }
    }
</script>
</body>
</html>
